<style>
:root,[data-theme="dark"]{--bg:#000;--bg2:#080008;--bg3:#0d000d;--border:#1a001a;--accent:#9b12d4;--accent2:#9b12d4;--text:#fff;--text2:#bbb;--text3:#555;}
[data-theme="light"]{--bg:#f8f8f8;--bg2:#ffffff;--bg3:#f0f0f0;--border:#e0e0e0;--text:#111111;--text2:#555555;--text3:#999999;}
*,*::before,*::after{transition-property:none!important;}
.spinner{animation:spin .7s linear infinite!important;}
.typing span{animation:bounce 1.2s infinite!important;}
.tog::after{transition:transform .2s!important;}
.modal{transition:transform .3s cubic-bezier(.4,0,.2,1)!important;}
.modal-bg{transition:opacity .25s!important;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-8px);opacity:1}}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Tema claro */




body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: var(--fs);
  transition: none;
}

/* Loading */
#ls { position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s; }
#ls.h { opacity:0;pointer-events:none; }
.ls-spin { width:32px;height:32px;border:3px solid rgba(155,18,212,0.2);border-top-color:#9b12d4;border-radius:50%;animation:spin .7s linear infinite;margin-top:20px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; height: 100%; width: 290px;
  background: var(--bg2); border-right: 1px solid var(--border);
  z-index: 200; transform: translateX(-100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  box-shadow: none;
}
.sidebar.open { transform: translateX(0); box-shadow: 6px 0 30px rgba(0,0,0,0.4); }
.overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;display:none;backdrop-filter:blur(3px); }
.overlay.open { display:block; }

/* Sidebar perfil */
.sb-top { padding: 28px 16px 20px; border-bottom: 1px solid var(--border); text-align: center; }
.sb-av { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: #f472b6; margin: 0 auto 12px; overflow: hidden; box-shadow: 0 0 20px rgba(155,18,212,0.2); }
.sb-av img { width:100%;height:100%;object-fit:cover;border-radius:50%; }
.sb-name { font-weight: 700; font-size: 16px; margin-bottom: 3px; }
.sb-email { color: var(--text3); font-size: 12px; }

/* Nav items */
.sb-nav { flex: 1; padding: 10px; overflow-y: auto; }
.ni { display: flex; align-items: center; gap: 14px; padding: 13px 14px; border-radius: 12px; color: var(--text2); font-size: 15px; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: all .15s; margin-bottom: 2px; }
.ni:hover { background: var(--bg3); color: var(--text); }
.ni:active { transform: none !important; background: var(--bg3); }
.ni-plus:active { background: rgba(155,18,212,0.2) !important; }
.ni.active { background: rgba(155,18,212,0.12); color: var(--text); }
.ni-ic { width: 22px; text-align: center; color: var(--accent); font-size: 15px; flex-shrink: 0; }
.ni-plus { background: none !important; border: none !important; color: var(--text2) !important; font-weight: 700 !important; margin: 6px 0 !important; }
.ni-danger:hover { background: rgba(220,38,38,0.08) !important; color: #f87171 !important; }
.ni-danger:hover .ni-ic { color: #f87171 !important; }
.sb-foot { padding: 10px; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text3); }

/* Header */
header { display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0; }
[data-theme="light"] header { background: var(--bg2); }
.h-title { font-size: 16px; font-weight: 700; letter-spacing: 3px; }
.btn-plus { border: 1.5px solid var(--accent); color: var(--accent); background: transparent; padding: 6px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter',sans-serif; transition: all .2s; }
.btn-plus:hover { background: rgba(155,18,212,0.1); }
.btn-home { background:none; border:none; color:var(--text2); font-size:13px; font-weight:700; cursor:pointer; padding:6px 10px; border-radius:8px; display:flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; transition:all .15s; }
.btn-home:hover { color:var(--accent); background:rgba(155,18,212,0.1); }

/* Chips — SEM emoji, letras maiores */
.chips { display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border); }
.chips::-webkit-scrollbar { display:none; }
.chip { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s; letter-spacing: 0.3px; }
.chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(155,18,212,0.05); }

/* Mensagens — SEM balão */
#messages { flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:20px; }
#messages::-webkit-scrollbar { width:3px; }
#messages::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }

/* Mensagem do utilizador — SEM balão */
.msg-user {
  font-size: 20px;
  line-height: 1.6;
  color: var(--text);
  text-align: right;
  padding: 0 0 12px 0;
  font-weight: 500;
}

/* Mensagem da IA — SEM balão */
.msg-ai {
  font-size: 20px;
  line-height: 1.8;
  color: var(--text);
  padding: 0 0 4px 0;
}
.ai-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg-actions { display:flex;gap:10px;margin-top:12px; }
.msg-btn { background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .15s; }
.msg-btn:hover { color:var(--accent); }

/* Typing */
.typing { display:flex;gap:5px;align-items:center;padding:8px 0; }
.typing span { width:8px;height:8px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay:.2s; }
.typing span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-8px);opacity:1} }

/* Input */
.input-area { flex-shrink:0;padding:10px 16px 24px;background:var(--bg); }
[data-theme="light"] .input-area { background: var(--bg2); }
.input-wrap { display:flex;align-items:flex-end;gap:10px;background:var(--bg3);border:1.5px solid #fff;border-radius:28px;padding:6px 8px 6px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:box-shadow .2s; }
[data-theme="light"] .input-wrap { background: var(--bg2); }
.input-wrap:focus-within { border-color:#fff; }
textarea#inp { flex:1;background:transparent;border:none;color:var(--text);font-size:var(--fs);outline:none;resize:none;min-height:38px;max-height:120px;line-height:1.5;padding:6px 0;font-family:'Inter',sans-serif; }
textarea#inp::placeholder { color:var(--text3); }
.btn-voice { background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:6px;flex-shrink:0;transition:color .15s; }
.btn-voice:hover, .btn-voice.active { color:var(--accent); }
.btn-send { width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s; }
.btn-send:hover { transform:scale(1.08);box-shadow:0 4px 16px rgba(155,18,212,0.4); }
.btn-send:disabled { opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none; }
.btn-plus-anexo { background:none;border:1.5px solid var(--border);color:var(--text2);font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s; }
.btn-plus-anexo:hover { background:var(--bg3);color:var(--text); }
.btn-plus-anexo.open { transform:rotate(45deg); }
.menu-anexo { display:none;position:absolute;bottom:56px;left:8px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,0.35);z-index:50;min-width:180px; }
.menu-anexo.open { display:block; }
.menu-anexo label { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--text);white-space:nowrap; }
.menu-anexo label:hover { background:var(--bg3); }
.menu-anexo label i { width:16px;color:var(--text3); }

/* Toast */
#toast { position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);border-radius:12px;padding:10px 20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw; }
#toast.show { opacity:1; }
#toast.s { border-color:#22c55e; }
#toast.e { border-color:#ef4444; }

/* Modal */
.modal-bg { position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px); }
.modal-bg.open { opacity:1;pointer-events:all; }
.modal { background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);width:100%;max-width:480px;padding:20px 20px 50px;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:80vh;overflow-y:auto; }
.modal-bg.open .modal { transform:translateY(0); }
.modal-handle { width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto 16px; }
.modal-title { font-size:18px;font-weight:700;margin-bottom:14px; }
.modal-item { background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:8px;font-size:14px;color:var(--text2);line-height:1.6; }
.modal-item strong { color:var(--text);display:block;margin-bottom:3px; }
.btn-modal { width:100%;padding:14px;border:1px solid var(--border);background:transparent;border-radius:12px;color:var(--text2);font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;margin-top:10px; }

/* Imagem no chat */
.chat-img { max-width:100%;border-radius:16px;display:block;margin:12px 0; }
.img-actions { display:flex;gap:8px;margin-top:8px; }
.img-btn { flex:1;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;text-align:center;text-decoration:none;display:block; }

</style>
</head>
<body>

<!-- Loading -->
<div id="ls">
  <div style="font-size:44px;font-weight:900;font-style:italic;letter-spacing:-1px;">VELORA IA</div>
  <div class="ls-spin"></div>
</div>

<script>
// Segurança: se o Firebase não responder (sem internet/backend), não fica preso a processar
window.authResolvido = false;
setTimeout(function(){
  if (window.authResolvido) return;
  var ls = document.getElementById('ls');
  if (ls) ls.classList.add('h');
  var sbName = document.getElementById('sb-name'); if (sbName) sbName.textContent = 'Convidado';
  var sbEmail = document.getElementById('sb-email'); if (sbEmail) sbEmail.textContent = 'modo de teste';
  var msgsEl = document.getElementById('messages');
  if (msgsEl && !msgsEl.hasChildNodes()) {
    msgsEl.innerHTML = '<div class="msg-ai"><div class="ai-label">VELORA IA</div><div>Estás em modo de teste (sem servidor/login ligado). Escreve uma mensagem para veres a interface a funcionar.</div></div>';
  }
  if (typeof window.enviar !== 'function') {
    window.enviar = function() {
      var inp = document.getElementById('inp');
      var txt = inp.value.trim();
      if (!txt) return;
      inp.value = '';
      var msgs = document.getElementById('messages');
      var u = document.createElement('div'); u.className = 'msg-user'; u.textContent = txt;
      msgs.appendChild(u);
      var a = document.createElement('div'); a.className = 'msg-ai';
      a.innerHTML = '<div class="ai-label">VELORA IA</div><div>(modo de teste — sem ligação ao servidor real)</div>';
      msgs.appendChild(a);
      msgs.scrollTop = msgs.scrollHeight;
    };
    window.teclaEnter = function(e){ if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.enviar(); } };
    window.autoH = function(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };
  }
}, 3000);
</script>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap" style="position:relative;">
    <button type="button" class="btn-plus-anexo" id="btn-plus-anexo" onclick="toggleMenuAnexo(event)" title="Anexar">
      <i class="fa-solid fa-plus"></i>
    </button>
    <div class="menu-anexo" id="menu-anexo">
      <label for="img-upload"><i class="fa-solid fa-image"></i> Enviar imagem</label>

<div id="toast"></div>

  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-t="favorites_title">Favoritos</div>
    <div id="fav-lista"></div>
    <button class="btn-modal" onclick="fechar('m-fav')" data-t="btn_close">Fechar</button>
  </div>
</div>

<!-- Modal Suporte -->
<div class="modal-bg" id="m-sup">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-t="support_title">Ajuda e Suporte</div>
    <div class="modal-item"><strong data-t="support_email_label">E-mail de Suporte</strong>assistente.19@gmail.com</div>
    <div class="modal-item"><strong data-t="support_hours_label">Horário</strong><span data-t="support_hours_val">Segunda a Sexta, 9h às 18h</span></div>
    <div class="modal-item"><strong data-t="support_version_label">Versão</strong>VELORA IA v1.0.0</div>
    <button class="btn-modal" onclick="fechar('m-sup')" data-t="btn_close">Fechar</button>
  </div>
</div>

<!-- Modal Logout -->
<div class="modal-bg" id="m-logout">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" data-t="logout_confirm_title">Sair da conta?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px;" data-t="logout_confirm_msg">Tens a certeza que queres sair?</p>
    <div style="display:flex;gap:10px;">
      <button onclick="fechar('m-logout')" style="flex:1;padding:14px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;" data-t="btn_cancel">Cancelar</button>
      <button id="btn-sair" style="flex:1;padding:14px;background:linear-gradient(135deg,#dc2626,#991b1b);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;" data-t="btn_exit">Sair</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth(initializeApp({
  apiKey: "AIzaSyAW2ISQ2TKR2p0-QF_v0aADiD-ttDpGm3c",
  authDomain: "velora-ia-e2539.firebaseapp.com",
  projectId: "velora-ia-e2539",
  storageBucket: "velora-ia-e2539.firebasestorage.app",
  messagingSenderId: "876348453170",
  appId: "1:876348453170:web:bcca8ebde23563e26a412b"
}));

const BACKEND = "https://vessel-solaris-jet-bargains.trycloudflare.com/api/chat";
const BACKEND_BASE = BACKEND.replace('/api/chat', '');

let carregando = false, historico = [], favoritos = [], user = null, modoAtual = 'chat';
const msgs = document.getElementById('messages');
const inp  = document.getElementById('inp');
const btnS = document.getElementById('btn-send');

onAuthStateChanged(auth, u => {
  window.authResolvido = true;
  if (!u) { window.location.href = 'index.html'; return; }
  try {
  user = u;
  const nome = u.displayName || u.email.split('@')[0];

  const av = document.getElementById('sb-av');
  const fotoLocal = localStorage.getItem('velora_foto_' + u.uid);
  if (fotoLocal) {
    av.innerHTML = `<img src="${fotoLocal}" alt="foto" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else if (u.photoURL) {
    av.innerHTML = `<img src="${u.photoURL}" alt="foto" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    av.textContent = nome[0].toUpperCase();
  }
  
  // Actualizar foto quando muda (listener)
  window.addEventListener('storage', (e) => {
    if (e.key === 'velora_foto_' + u.uid) {
      const novaFoto = e.newValue;
      if (novaFoto) av.innerHTML = `<img src="${novaFoto}" alt="foto" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    }
  });
  document.getElementById('sb-name').textContent = nome;
  // Guardar uid para sistema de limites
  localStorage.setItem('velora_uid', u.uid);
  localStorage.setItem('vp_plano', localStorage.getItem('vp_plano') || 'free');
  document.getElementById('sb-email').textContent = u.email;

  const h = localStorage.getItem('vh_' + u.uid);
  const f = localStorage.getItem('vf_' + u.uid);
  if (h) historico = JSON.parse(h);
  if (f) favoritos = JSON.parse(f);

  msgs.innerHTML = '';
  if (historico.length > 0) {
    historico.forEach(m => m.role === 'user' ? addUser(m.content) : addAI(m.content));
  } else {
    addAI(t('welcome_msg').replace('{name}', nome.split(' ')[0]));
  }

  // Aplicar idioma depois do DOM estar pronto
  aplicarIdioma();
  // Actualizar placeholder textarea
  inp.placeholder = t('chat_placeholder');
  } catch(e) {
    console.error('Erro ao carregar chat:', e);
  } finally {
    document.getElementById('ls').classList.add('h');
  }
});

document.getElementById('btn-sair').addEventListener('click', async () => {
  await signOut(auth);
  localStorage.clear();
  window.location.href = 'index.html';
});

document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
});

// ── Funções globais ───────────────────────────────
window.go = url => window.location.href = url;
window.openSB = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); };
window.closeSB = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
window.fechar = id => document.getElementById(id).classList.remove('open');

window.novoChat = () => {
  closeSB();
  historico = [];
  if (user) localStorage.removeItem('vh_' + user.uid);
  msgs.innerHTML = '';
  addAI(t('new_chat_msg'));
};

window.abrirHistorico = () => {
  closeSB();
  const lista = document.getElementById('hist-lista');
  if (!historico.length) {
    lista.innerHTML = `<p style="color:var(--text3);text-align:center;padding:20px;" data-t="history_empty">${t('history_empty')}</p>`;
  } else {
    lista.innerHTML = historico.slice(-12).reverse().map(m => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:${m.role==='user'?'#a855f7':'var(--accent)'};margin-bottom:5px;text-transform:uppercase;">
          ${m.role==='user'?'Tu':'VELORA IA'}
        </div>
        <div style="font-size:14px;color:var(--text2);line-height:1.5;">${m.content.replace(/<[^>]*>/g,'').slice(0,120)}${m.content.length>120?'...':''}</div>
      </div>`).join('');
  }
  document.getElementById('m-hist').classList.add('open');
};

window.abrirFavoritos = () => {
  closeSB();
  const lista = document.getElementById('fav-lista');
  if (!favoritos.length) {
    lista.innerHTML = `<p style="color:var(--text3);text-align:center;padding:20px;">${t('favorites_empty')}</p>`;
  } else {
    lista.innerHTML = favoritos.map((f, i) => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:8px;">${f.content.replace(/<[^>]*>/g,'').slice(0,120)}...</div>
        <button onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(f.content.replace(/<[^>]*>/g,''))}'));toast('${t('copy_msg')}','s')" style="padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;">Copiar</button>
      </div>`).join('');
  }
  document.getElementById('m-fav').classList.add('open');
};

window.abrirSuporte = () => { closeSB(); aplicarIdioma(); document.getElementById('m-sup').classList.add('open'); };
window.abrirLogout = () => { closeSB(); document.getElementById('m-logout').classList.add('open'); };

// ── Mensagens sem balão ───────────────────────────
function addUser(txt) {
  const d = document.createElement('div');
  d.className = 'msg-user';
  d.textContent = txt;
  msgs.appendChild(d);
  scroll();
}

function addAI(txt, imageUrl = null) {
  const d = document.createElement('div');
  d.className = 'msg-ai';
  const enc = encodeURIComponent(txt);
  const imagemHtml = imageUrl
    ? `<img src="${imageUrl}" class="chat-img" alt="Imagem gerada pela VELORA IA" loading="lazy"/>`
    : '';
  d.innerHTML = `
    <div class="ai-label"><i class="fa-solid fa-wand-magic-sparkles"></i> <span data-t="velora_label">VELORA IA</span></div>
    ${imagemHtml}
    <div>${fmt(txt)}</div>
    <div class="msg-actions">
      <button class="msg-btn" onclick="navigator.clipboard.writeText(decodeURIComponent('${enc}'.replace(/\\+/g,' ')));toast(t('copy_msg'),'s')" title="Copiar"><i class="fa-regular fa-copy"></i></button>
      <button class="msg-btn" onclick="guardarFav(decodeURIComponent('${enc}'.replace(/\\+/g,' ')))" title="Guardar"><i class="fa-regular fa-star"></i></button>
      <button class="msg-btn" onclick="tocarAudio(this, decodeURIComponent('${enc}'.replace(/\\+/g,' ')))" title="Ouvir"><i class="fa-solid fa-volume-high"></i></button>
    </div>`;
  msgs.appendChild(d);
  scroll();
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg-ai'; d.id = 'typing';
  d.innerHTML = `<div class="ai-label"><i class="fa-solid fa-wand-magic-sparkles"></i> VELORA IA</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(d);
  scroll();
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function scroll() { setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 60); }

function fmt(txt) {
  // Detectar imagem
  if (txt.includes('<img ')) return txt;
  return txt
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, `<code style="background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:14px;color:#ff99dd;font-family:monospace;">$1</code>`)
    .replace(/\n/g, '<br>');
}

window.guardarFav = (txt) => {
  favoritos.unshift({ content: txt, date: new Date().toISOString() });
  if (favoritos.length > 30) favoritos.pop();
  if (user) localStorage.setItem('vf_' + user.uid, JSON.stringify(favoritos));
  toast(t('saved_fav'), 's');
};

// ── Enviar mensagem ───────────────────────────────
window.enviar = async function() {
  if (carregando) return;
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  inp.style.height = 'auto';
  addUser(txt);
  historico.push({ role: 'user', content: txt });
  guardarHist();
  carregando = true;
  btnS.disabled = true;
  addTyping();
  try {
    const currentLang = getLang ? getLang() : 'pt';
    const res = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: txt,
        history: historico.slice(-10),
        user_id: user?.uid || 'guest',
        lang: currentLang,
        modo: modoAtual
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const reply = data.reply || data.message || '';
    removeTyping();
    addAI(reply, data.image_url || null);
    historico.push({ role: 'model', content: reply });
    guardarHist();
  } catch(e) {
    removeTyping();
    addAI(t('server_error'));
  }
  carregando = false;
  btnS.disabled = false;
};

function guardarHist() {
  if (user) localStorage.setItem('vh_' + user.uid, JSON.stringify(historico.slice(-30)));
}

window.setModo = (modo) => { modoAtual = modo; };
window.enviarRapido = (txt) => { inp.value = txt; window.enviar(); };
window.teclaEnter = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.enviar(); } };
window.autoH = (el) => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };

// ── Voz ──────────────────────────────────────────
window.iniciarVoz = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast(t('voice_unsupported'), 'e'); return; }
  const r = new SR();
  r.lang = getLang() === 'en' ? 'en-US' : getLang() === 'es' ? 'es-ES' : 'pt-PT';
  const btn = document.getElementById('btn-voice');
  btn.classList.add('active');
  toast(t('voice_listening'), 's');
  r.start();
  r.onresult = e => { inp.value = e.results[0][0].transcript; btn.classList.remove('active'); window.enviar(); };
  r.onerror = r.onend = () => btn.classList.remove('active');
};

// ── Toast ─────────────────────────────────────────

// ── Detectar mudanças de tema e idioma em tempo real ──
window.addEventListener('storage', (e) => {
  if (e.key === 'vp_dark') {
    aplicarTema();
  }
  if (e.key === 'vp_lang') {
    aplicarIdioma();
    // Actualizar placeholder
    document.getElementById('inp').placeholder = t('chat_placeholder');
    // Actualizar chips
    document.getElementById('chip1').textContent = t('chip_1');
    document.getElementById('chip2').textContent = t('chip_2');
    document.getElementById('chip3').textContent = t('chip_3');
    document.getElementById('chip4').textContent = t('chip_4');
    document.getElementById('chip5').textContent = t('chip_5');
    document.getElementById('chip6').textContent = t('chip_6');
    // Actualizar header
    document.querySelector('[data-t="chat_title"]').textContent = t('chat_title');
    // Actualizar sidebar
    document.querySelectorAll('[data-t]').forEach(el => {
      el.textContent = t(el.getAttribute('data-t'));
    });
  }
  if (e.key === 'vp_fonte') {
    aplicarFonte();
  }
});

// ── Enviar imagem para análise ───────────────────
window.enviarImagem = async function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Imagem muito grande. Máximo 5MB.', 'e'); return; }

  // Mostrar preview no chat
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;

    // Mostrar imagem no chat
    const d = document.createElement('div');
    d.className = 'msg-user';
    d.innerHTML = `<img src="${base64}" style="max-width:200px;border-radius:12px;display:block;margin-bottom:6px;"><span>📎 Imagem enviada</span>`;
    document.getElementById('messages').appendChild(d);
    scroll();

    // Enviar para análise
    historico.push({ role: 'user', content: '[Utilizador enviou uma imagem para análise]' });
    guardarHist();

    carregando = true;
    btnS.disabled = true;
    addTyping();

    try {
      const res = await fetch(BACKEND, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: 'O utilizador enviou uma imagem. Analisa e descreve o que vês na imagem de forma detalhada e útil.',
          history: historico.slice(-6),
          user_id: user?.uid || 'guest',
          lang: getLang ? getLang() : 'pt',
          image: base64
        })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const reply = data.reply || '';
      removeTyping();
      addAI(reply);
      historico.push({ role: 'model', content: reply });
      guardarHist();
    } catch(e) {
      removeTyping();
      addAI(t('server_error'));
    }
    carregando = false;
    btnS.disabled = false;
  };
  reader.readAsDataURL(file);
  input.value = ''; // Reset para permitir enviar a mesma imagem
};

let audioAtual = null;
window.tocarAudio = async function(botao, texto) {
  const icone = botao.querySelector('i');
  if (audioAtual && !audioAtual.paused) {
    audioAtual.pause();
    icone.className = 'fa-solid fa-volume-high';
    if (audioAtual.dataset.botao === botao) return; // clicou no mesmo botão -> só pausar
  }
  icone.className = 'fa-solid fa-spinner fa-spin';
  try {
    const res = await fetch(`${BACKEND_BASE}/api/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: texto, user_id: user?.uid || 'guest' })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    audioAtual = new Audio(data.audio_url);
    icone.className = 'fa-solid fa-volume-xmark';
    audioAtual.play();
    audioAtual.onended = () => { icone.className = 'fa-solid fa-volume-high'; };
  } catch(e) {
    icone.className = 'fa-solid fa-volume-high';
    toast('Não foi possível gerar o áudio.', 'e');
  }
};

window.toggleMenuAnexo = function(ev) {
  ev.stopPropagation();
  document.getElementById('menu-anexo').classList.toggle('open');
  document.getElementById('btn-plus-anexo').classList.toggle('open');
};
window.fecharMenuAnexo = function() {
  document.getElementById('menu-anexo').classList.remove('open');
  document.getElementById('btn-plus-anexo').classList.remove('open');
};
document.addEventListener('click', (ev) => {
  const menu = document.getElementById('menu-anexo');
  const btn = document.getElementById('btn-plus-anexo');
  if (menu && menu.classList.contains('open') && !menu.contains(ev.target) && ev.target !== btn) {
    fecharMenuAnexo();
  }
});

window.enviarArquivo = async function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 15 * 1024 * 1024) { toast('Ficheiro muito grande. Máximo 15MB.', 'e'); return; }

  const d = document.createElement('div');
  d.className = 'msg-user';
  d.innerHTML = `<i class="fa-solid fa-file-lines"></i> <span>${file.name}</span>`;
  document.getElementById('messages').appendChild(d);
  scroll();

  historico.push({ role: 'user', content: `[Utilizador enviou o ficheiro: ${file.name}]` });
  guardarHist();

  carregando = true;
  btnS.disabled = true;
  addTyping();

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('user_id', user?.uid || 'guest');
    formData.append('lang', getLang ? getLang() : 'pt');

    const res = await fetch(`${BACKEND_BASE}/api/analisar-arquivo`, {
      method: 'POST',
      body: formData
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const reply = data.reply || '';
    removeTyping();
    addAI(reply);
    historico.push({ role: 'model', content: reply });
    guardarHist();
  } catch(e) {
    removeTyping();
    addAI(t('server_error'));
  }
  carregando = false;
  btnS.disabled = false;
  input.value = '';
};

window.toast = (msg, tipo = 'i', dur = 3000) => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${tipo}`;
  setTimeout(() => el.className = '', dur);
};
</script>

</body>
