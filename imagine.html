<!DOCTYPE html>
<html lang="pt">
<head>
<script>!function(){function g(k,d){try{return JSON.parse(localStorage.getItem('vp_'+k))??d}catch(e){return d}}var dark=g('dark',true);document.documentElement.setAttribute('data-theme',dark?'dark':'light');window._LANG=g('lang','pt');window._DARK=dark;}();</script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VELORA — Imagens</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="velora.js"></script>
<script src="velora-limits.js"></script>
<style>
:root,[data-theme="dark"]{--bg:#000;--bg2:#080008;--bg3:#0d000d;--border:#1a001a;--accent:#d414bd;--accent2:#9b12d4;--text:#fff;--text2:#bbb;--text3:#555;}
[data-theme="light"]{--bg:#f8f8f8;--bg2:#ffffff;--bg3:#f0f0f0;--border:#e0e0e0;--text:#111111;--text2:#555555;--text3:#999999;}
*,*::before,*::after{transition-property:none!important;}
.spinner{animation:spin .7s linear infinite!important;}
.typing span{animation:bounce 1.2s infinite!important;}
.tog::after{transition:transform .2s!important;}
.modal{transition:transform .3s cubic-bezier(.4,0,.2,1)!important;}
.modal-bg{transition:opacity .25s!important;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-8px);opacity:1}}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }


body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; font-size:var(--fs); }

header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:var(--bg); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
[data-theme="light"] header { background:var(--bg2); }
.h-title { font-size:16px; font-weight:700; letter-spacing:3px; }
.btn-back { background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; padding:4px; }
.btn-plus { border:1.5px solid var(--accent); color:var(--accent); background:transparent; padding:6px 14px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; }

/* Tabs - só IA e Galeria */
.tabs { display:flex; border-bottom:1px solid var(--border); }
.tab { flex:1; padding:14px 8px; text-align:center; font-size:15px; font-weight:700; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; letter-spacing:0.5px; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

main { flex:1; padding:20px 18px 80px; max-width:480px; width:100%; margin:0 auto; }
.panel { display:none; }
.panel.active { display:block; }

/* Tipo de imagem */
.tipo-title { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.tipos { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.tipo-btn { padding:9px 18px; background:var(--bg2); border:1.5px solid var(--border); border-radius:20px; color:var(--text2); font-size:15px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
.tipo-btn:hover { border-color:var(--accent); color:var(--accent); }
.tipo-btn.active { border-color:var(--accent); background:rgba(212,20,189,0.08); color:var(--accent); }

/* Estilos visuais */
.styles-title { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.styles { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.style-btn { padding:9px 18px; background:var(--bg2); border:1.5px solid var(--border); border-radius:20px; color:var(--text2); font-size:15px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
.style-btn:hover { border-color:var(--accent); color:var(--accent); }
.style-btn.active { border-color:var(--accent); background:rgba(212,20,189,0.08); color:var(--accent); }

/* Input */
textarea.prompt { width:100%; background:var(--bg2); border:1.5px solid var(--border); border-radius:16px; padding:14px 16px; color:var(--text); font-size:var(--fs); font-family:'Inter',sans-serif; outline:none; resize:none; min-height:80px; line-height:1.6; transition:border-color .2s; margin-bottom:16px; }
[data-theme="light"] textarea.prompt { background:#fff; }
textarea.prompt:focus { border-color:var(--accent); }
textarea.prompt::placeholder { color:var(--text3); }

/* Botão gerar */
.btn-gen { width:100%; padding:16px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
.btn-gen:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(212,20,189,0.35); }
.btn-gen:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }
.free-info { text-align:center; font-size:12px; color:var(--text3); margin-bottom:20px; }

/* Galeria grid - layout flexível */
.gallery-grid { columns:2; gap:10px; margin-top:16px; }
.gallery-grid.single { columns:1; }
.img-card { break-inside:avoid; margin-bottom:10px; border-radius:14px; overflow:hidden; position:relative; background:var(--bg3); cursor:pointer; }
.img-card img { width:100%; display:block; border-radius:14px; }
.img-card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%); border-radius:14px; opacity:0; transition:opacity .2s; display:flex; align-items:flex-end; padding:10px; gap:6px; }
.img-card:hover .img-card-overlay { opacity:1; }
.img-card:active .img-card-overlay { opacity:1; }
.ic-btn { flex:1; padding:8px; background:rgba(255,255,255,0.15); border:none; border-radius:8px; color:#fff; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; backdrop-filter:blur(4px); text-decoration:none; text-align:center; }

/* Placeholder loading */
.img-placeholder { border-radius:14px; background:var(--bg3); aspect-ratio:1; display:flex; align-items:center; justify-content:center; margin-bottom:10px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
.spinner { width:24px; height:24px; border:2px solid rgba(212,20,189,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Galeria vazia */
.gallery-empty { text-align:center; padding:60px 20px; color:var(--text3); }
.gallery-empty i { font-size:40px; margin-bottom:12px; display:block; color:var(--border); }

/* Lightbox */
.lb { position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
.lb img { max-width:100%; max-height:78vh; border-radius:16px; object-fit:contain; box-shadow:0 0 60px rgba(0,0,0,0.5); }
.lb-actions { display:flex; gap:12px; margin-top:16px; }
.lb-btn { padding:12px 24px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; border:none; }

/* Toast */
#toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--accent); border-radius:12px; padding:10px 20px; font-size:13px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; max-width:90vw; }
#toast.show { opacity:1; }
#toast.s { border-color:#22c55e; }
#toast.e { border-color:#ef4444; }

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:6px 0 16px;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;}
.bn i{font-size:20px;color:var(--text3);}
.bn span{font-size:10px;font-weight:600;color:var(--text3);}
.bn.active i,.bn.active span{color:var(--accent);}

.insp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:20px;}
.insp-card{border-radius:12px;overflow:hidden;position:relative;aspect-ratio:1;cursor:pointer;}
.insp-card img{width:100%;height:100%;object-fit:cover;display:block;}
.insp-card .insp-ov{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;padding:8px;opacity:0;transition:opacity .2s;}
.insp-card:hover .insp-ov,.insp-card:active .insp-ov{opacity:1;}
.insp-label{font-size:10px;font-weight:700;color:#fff;letter-spacing:0.5px;}
.insp-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text);}
</style>
</head>
<body>

<header>
  <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="h-title" id="page-title">GERAR IMAGENS</div>
  <button class="btn-plus" onclick="location.href='plus.html'">Plus</button>
</header>

<div class="tabs">
  <div class="tab active" id="tab-ia" onclick="switchTab('ia')">IA</div>
  <div class="tab" id="tab-gallery" onclick="switchTab('gallery')">Galeria</div>
</div>

<main>
  <!-- Painel IA -->
  <div class="panel active" id="panel-ia">

  <!-- Galeria de inspiração -->
  <div style="margin-bottom:20px;">
    <div class="insp-title">✨ Inspiração — criado pela VELORA IA</div>
    <div class="insp-grid">
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Carro de Luxo</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Casa de Luxo</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Paraíso</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Iate de Luxo</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1518156677180-95a2893f3499?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Prédio Moderno</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Fundo do Mar</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Montanhas</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1473615695634-cb2dd0bb8d0e?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Cascata</span></div></div>
      <div class="insp-card"><img src="https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=300&q=85" alt=""/><div class="insp-ov"><span class="insp-label">Deserto de Sal</span></div></div>
    </div>
  </div>

    <!-- Tipo de conteúdo -->
    <div class="tipo-title">TIPO DE CONTEÚDO</div>
    <div class="tipos">
      <button class="tipo-btn active" data-tipo="visual" onclick="pickTipo(this)">Visual</button>
      <button class="tipo-btn" data-tipo="poesia" onclick="pickTipo(this)">Poesia</button>
      <button class="tipo-btn" data-tipo="motivacao" onclick="pickTipo(this)">Motivação</button>
      <button class="tipo-btn" data-tipo="meme" onclick="pickTipo(this)">Meme</button>
      <button class="tipo-btn" data-tipo="legenda" onclick="pickTipo(this)">Legenda</button>
    </div>

    <!-- Estilos visuais -->
    <div class="styles-title">ESTILO</div>
    <div class="styles">
      <button class="style-btn active" data-style="photorealistic, ultra detailed, 4k" onclick="pickStyle(this)">Realista</button>
      <button class="style-btn" data-style="luxury aesthetic, cinematic lighting" onclick="pickStyle(this)">Luxo</button>
      <button class="style-btn" data-style="dark moody, dramatic shadows" onclick="pickStyle(this)">Dark</button>
      <button class="style-btn" data-style="golden hour, warm tones" onclick="pickStyle(this)">Golden</button>
      <button class="style-btn" data-style="minimalist, clean, elegant" onclick="pickStyle(this)">Minimal</button>
      <button class="style-btn" data-style="vivid colors, vibrant" onclick="pickStyle(this)">Vibrante</button>
    </div>

    <!-- Input -->
    <textarea class="prompt" id="prompt-inp" rows="3"
      placeholder="Descreve o que queres criar... Ex: poema sobre liberdade, meme engraçado, frase motivacional"></textarea>

    <button class="btn-gen" id="btn-gen" onclick="gerarImagens()">
      <span id="btn-gen-txt">GERAR IMAGENS</span>
    </button>
    <div class="free-info">4 imagens grátis por geração · IA Pollinations</div>

    <div class="gallery-grid" id="img-grid"></div>
  </div>

  <!-- Painel Galeria -->
  <div class="panel" id="panel-gallery">
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</main>

<div id="toast"></div>

<script>
let estilo = 'photorealistic, ultra detailed, 4k';
let tipo = 'visual';
let galeria = JSON.parse(localStorage.getItem('velora_gallery') || '[]');

document.addEventListener('DOMContentLoaded', () => {
  if (typeof veloraInit === 'function') veloraInit();
  document.getElementById('page-title').textContent = typeof t === 'function' ? t('imagine_title') : 'GERAR IMAGENS';
  mostrarGaleria();
});

window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'gallery') mostrarGaleria();
};

window.pickTipo = (btn) => {
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tipo = btn.dataset.tipo;

  // Sugerir placeholder conforme tipo
  const placeholders = {
    visual: 'Descreve a imagem que queres criar...',
    poesia: 'Escreve ou descreve o tema da poesia...',
    motivacao: 'Qual é a mensagem motivacional?',
    meme: 'Descreve o meme que queres criar...',
    legenda: 'Qual é o tema da legenda?'
  };
  document.getElementById('prompt-inp').placeholder = placeholders[tipo] || placeholders.visual;
};

window.pickStyle = (btn) => {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  estilo = btn.dataset.style;
};

// Construir prompt inteligente baseado no tipo
function buildPrompt(userText) {
  const base = userText.trim();
  
  const prompts = {
    visual: `${base}, ${estilo}, high quality, stunning`,
    
    poesia: `Beautiful artistic image with elegant typography, the following poem text displayed beautifully overlaid on the image: "${base}". 
      Background: soft romantic scenery with hearts, flowers, or nature. 
      Text style: elegant serif font, white text with soft shadow, centered. 
      Style: ${estilo}, poetic, emotional, high quality photography`,
    
    motivacao: `Motivational poster image with bold inspiring typography. 
      Text displayed prominently: "${base}". 
      Background: powerful scenic landscape, mountain peak, sunrise, or abstract gradient. 
      Font: bold modern sans-serif, white or gold text, strong shadow. 
      Style: ${estilo}, inspirational, professional design`,
    
    meme: `Funny meme image with text overlay: "${base}". 
      Style: internet meme aesthetic, bold Impact font, white text with black outline at top and bottom. 
      Background: relevant funny or relatable scene. 
      High quality, clear text, ${estilo}`,
    
    legenda: `Social media post image with caption text beautifully integrated: "${base}". 
      Style: Instagram aesthetic, ${estilo}, lifestyle photography. 
      Text: elegant font overlay, soft gradient background for readability. 
      Professional social media quality`
  };
  
  return prompts[tipo] || prompts.visual;
}

window.gerarImagens = async () => {
  // Verificar limites
  const uid = localStorage.getItem('velora_uid') || 'guest';
  const check = VELORA_LIMITS.podeUsar(uid, 'imagens');
  if (!check.pode) {
    const lang = localStorage.getItem('vp_lang') ? JSON.parse(localStorage.getItem('vp_lang')) : 'pt';
    const msg = VELORA_LIMITS.getMensagemBloqueio(check, lang);
    mostrarBloqueio(msg);
    return;
  }
  // Registar uso antes de gerar
  VELORA_LIMITS.registarUso(uid, 'imagens');

  const userText = document.getElementById('prompt-inp').value.trim();
  if (!userText) { toast('Descreve o que queres criar', 'e'); return; }

  const btn = document.getElementById('btn-gen');
  const btnTxt = document.getElementById('btn-gen-txt');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  const grid = document.getElementById('img-grid');
  grid.innerHTML = Array(4).fill('<div class="img-placeholder"><div class="spinner"></div></div>').join('');

  const finalPrompt = buildPrompt(userText);
  const urls = [];

  for (let i = 0; i < 4; i++) {
    const seed = Math.floor(Math.random() * 999999);
    const encoded = encodeURIComponent(finalPrompt);
    urls.push(`https://image.pollinations.ai/prompt/${encoded}?width=800&height=800&nologo=true&seed=${seed}&enhance=true`);
  }

  grid.innerHTML = urls.map((url, i) => `
    <div class="img-card" onclick="abrirLightbox('${url}')">
      <img src="${url}" alt="imagem ${i+1}" loading="lazy"
        onerror="this.parentElement.style.display='none'">
      <div class="img-card-overlay">
        <a href="${url}" download="velora-${i+1}.jpg" target="_blank"
          class="ic-btn" onclick="event.stopPropagation()">Guardar</a>
        <button class="ic-btn" onclick="event.stopPropagation();adicionarGaleria('${url}')">Galeria</button>
      </div>
    </div>`).join('');

  btn.disabled = false;
  btn.innerHTML = '<span id="btn-gen-txt">GERAR IMAGENS</span>';
};

window.adicionarGaleria = (url) => {
  if (!galeria.includes(url)) {
    galeria.unshift(url);
    if (galeria.length > 100) galeria.pop();
    localStorage.setItem('velora_gallery', JSON.stringify(galeria));
  }
  toast('Guardado na galeria!', 's');
};

window.mostrarGaleria = () => {
  const grid = document.getElementById('gallery-grid');
  if (!galeria.length) {
    grid.innerHTML = '<div class="gallery-empty"><i class="fa-regular fa-image"></i><p>Sem imagens guardadas ainda.<br>Gera imagens e adiciona à galeria.</p></div>';
    return;
  }
  // Layout misto - algumas imagens em destaque
  grid.innerHTML = galeria.map((url, i) => `
    <div class="img-card" onclick="abrirLightbox('${url}')">
      <img src="${url}" alt="galeria ${i+1}" loading="lazy">
      <div class="img-card-overlay">
        <a href="${url}" download="velora.jpg" target="_blank"
          class="ic-btn" onclick="event.stopPropagation()">Guardar</a>
        <button class="ic-btn" onclick="event.stopPropagation();removerGaleria(${i})">Remover</button>
      </div>
    </div>`).join('');
};

window.removerGaleria = (i) => {
  galeria.splice(i, 1);
  localStorage.setItem('velora_gallery', JSON.stringify(galeria));
  mostrarGaleria();
};

window.abrirLightbox = (url) => {
  const lb = document.createElement('div');
  lb.className = 'lb';
  lb.innerHTML = `
    <img src="${url}" alt="imagem">
    <div class="lb-actions">
      <a href="${url}" download="velora.jpg" target="_blank"
        class="lb-btn" style="background:linear-gradient(135deg,#d414bd,#9b12d4);color:#fff;text-decoration:none;">
        Guardar
      </a>
      <button class="lb-btn" style="background:#0d000d;color:#bbb;border:1px solid #1a001a;"
        onclick="this.closest('.lb').remove()">Fechar</button>
    </div>
    <p style="color:#444;font-size:12px;margin-top:10px;">No telemóvel: pressiona prolongadamente → Guardar</p>`;
  lb.addEventListener('click', e => { if (e.target === lb) lb.remove(); });
  document.body.appendChild(lb);
};


// Listener para mudanças de tema e idioma em tempo real
window.addEventListener('storage', function(ev) {
  if (ev.key === 'vp_dark') {
    document.documentElement.setAttribute('data-theme', JSON.parse(ev.newValue) ? 'dark' : 'light');
  }
  if (ev.key === 'vp_lang' && typeof aplicarIdioma === 'function') {
    aplicarIdioma();
    document.querySelectorAll('[data-t]').forEach(function(el) {
      if (typeof t === 'function') el.textContent = t(el.getAttribute('data-t'));
    });
  }
});

window.mostrarBloqueio = (msg) => {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);';
  div.innerHTML = `
    <div style="background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);width:100%;max-width:480px;padding:24px 20px 50px;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;">⏳</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text);">${msg}</div>
      <button onclick="location.href='plus.html'" style="width:100%;margin-top:16px;padding:15px;background:linear-gradient(135deg,#d414bd,#9b12d4);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">
        👑 Ver Planos
      </button>
      <button onclick="this.closest('div').parentElement.remove()" style="width:100%;margin-top:10px;padding:14px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;">
        Fechar
      </button>
    </div>`;
  div.addEventListener('click', e => { if(e.target===div) div.remove(); });
  document.body.appendChild(div);
};

window.toast = (msg, tipo='i', dur=3000) => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${tipo}`;
  setTimeout(() => el.className='', dur);
};
</script>
