<script>

setTimeout(function(){
  if (window._authResolvidoIndex) return;
  var ls = document.getElementById('ls');
  if (ls) ls.classList.add('h');

<script src="velora.js" defer></script>
<style>
:root,[data-theme="dark"]{--bg:#000;--bg2:#080008;--bg3:#0d000d;--border:#1a001a;--accent:#9b12d4;--accent2:#9b12d4;--text:#fff;--text2:#bbb;--text3:#555;}
[data-theme="light"]{--bg:#f8f8f8;--bg2:#ffffff;--bg3:#f0f0f0;--border:#e0e0e0;--text:#111111;--text2:#555555;--text3:#999999;}
*,*::before,*::after{transition-property:none!important;}
.spinner{animation:spin .7s linear infinite!important;}
.typing span{animation:bounce 1.2s infinite!important;}
.tog::after{transition:transform .2s!important;}
.modal{transition:transform .3s cubic-bezier(.4,0,.2,1)!important;}
.modal-bg{transition:opacity .25s!important;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-8px);opacity:1}}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:50px 24px 30px; overflow:hidden; position:relative; font-size:var(--fs); transition:none; }

.neon { position:fixed; bottom:-120px; left:50%; transform:translateX(-50%); width:130%; height:400px; background:radial-gradient(ellipse,rgba(155,18,212,0.3) 0%,transparent 70%); filter:blur(50px); pointer-events:none; z-index:0; }
body.light .neon { opacity:0.3; }

.content { position:relative; z-index:1; width:100%; max-width:420px; }

.logo { font-size:56px; font-weight:900; letter-spacing:-2px; font-style:italic; text-align:center; margin-bottom:10px; }
.tagline { color:var(--text2); font-size:15px; text-align:center; line-height:1.6; margin-bottom:40px; }

.btn-google { width:100%; display:flex; align-items:center; justify-content:center; gap:12px; background:var(--bg2); color:var(--text); border:1px solid var(--border); border-radius:14px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; margin-bottom:16px; }
.btn-google:hover { background:var(--bg3); transform:translateY(-1px); }
body.light .btn-google { background:#fff; box-shadow:0 2px 12px rgba(0,0,0,0.1); color:#111; }

.divider { display:flex; align-items:center; gap:12px; margin:4px 0 16px; }
.divider div { flex:1; height:1px; background:var(--border); }
.divider span { color:var(--text3); font-size:13px; }

.inp { width:100%; background:var(--bg2); border:1.5px solid var(--border); border-radius:14px; padding:15px 18px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s; margin-bottom:10px; display:block; }
.inp:focus { border-color:var(--accent); }
.inp::placeholder { color:var(--text3); }
body.light .inp { background:#fff; box-shadow:0 1px 6px rgba(0,0,0,0.06); }

.pass-wrap { position:relative; margin-bottom:10px; }
.pass-wrap .inp { margin-bottom:0; padding-right:48px; }
.btn-eye { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text3); padding:4px; display:flex; align-items:center; }
.btn-eye:hover { color:var(--text2); }

.btn-primary { width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:14px; padding:16px; color:#fff; font-size:16px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:all .2s; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(155,18,212,0.4); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }

.switch-mode { text-align:center; margin-top:16px; font-size:14px; color:var(--text3); }
.switch-mode a { color:var(--accent); font-weight:600; cursor:pointer; text-decoration:none; }

.error-box { background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.3); border-radius:12px; padding:12px 16px; font-size:13px; color:#fca5a5; margin-bottom:12px; display:none; text-align:center; }
.error-box a { color:#fca5a5; font-weight:700; text-decoration:underline; cursor:pointer; }
.success-box { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:12px; padding:12px 16px; font-size:13px; color:#86efac; margin-bottom:12px; display:none; text-align:center; }

.spinner { width:20px; height:20px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }

.forgot { text-align:right; font-size:13px; margin-bottom:6px; }
.forgot a { color:var(--accent); cursor:pointer; text-decoration:none; }

footer { text-align:center; font-size:12px; color:var(--text3); line-height:1.6; position:relative; z-index:1; }
footer a { color:var(--accent); text-decoration:none; }

#ls { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
#ls.h { display:none; }
.ls-spin { width:28px; height:28px; border:3px solid rgba(155,18,212,0.2); border-top-color:#9b12d4; border-radius:50%; animation:spin .7s linear infinite; margin-top:20px; }
</style>
</head>
<body>

<div id="ls">
  <div style="font-size:44px;font-weight:900;font-style:italic;letter-spacing:-1px;">VELORA IA</div>
  <div class="ls-spin"></div>
</div>

<div class="neon"></div>

<header class="content" style="text-align:center;margin-top:20px;">
  <div class="logo">VELORA IA</div>
  <p class="tagline" data-t="tagline">A tua assistente de inteligência artificial pessoal</p>
</header>

<main class="content" id="main-form">
  <button class="btn-google" id="btn-google" onclick="loginGoogle()">
    <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    <span data-t="btn_google">Continuar com Google</span>
  </button>

  <div class="divider"><div></div><span data-t="or">ou</span><div></div></div>

  <div class="error-box" id="error-box"></div>
  <div class="success-box" id="success-box"></div>

  <input class="inp" id="email" type="email" data-t-ph="email_ph" placeholder="E-mail" autocomplete="email"/>

  <div class="pass-wrap">
    <input class="inp" id="password" type="password" data-t-ph="pass_ph" placeholder="Palavra-passe" autocomplete="current-password" onkeydown="if(event.key==='Enter') submit()"/>
    <button type="button" class="btn-eye" onclick="alternarVerPassword('password', this)" title="Mostrar/ocultar palavra-passe">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <div class="pass-wrap" id="confirm-wrap" style="display:none;">
    <input class="inp" id="confirm-password" type="password" data-t-ph="confirm_ph" placeholder="Confirmar palavra-passe" onkeydown="if(event.key==='Enter') submit()"/>
    <button type="button" class="btn-eye" onclick="alternarVerPassword('confirm-password', this)" title="Mostrar/ocultar palavra-passe">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <div class="forgot" id="forgot-wrap"><a onclick="resetPass()" data-t="forgot">Esqueceste a palavra-passe?</a></div>

  <button class="btn-primary" id="btn-submit" onclick="submit()">
    <span id="btn-txt" data-t="btn_access">Entrar</span>
  </button>

  <div class="switch-mode" id="switch-text">
    <span data-t="no_account">Não tens conta?</span> <a onclick="toRegister()" data-t="create_account">Criar conta</a>
  </div>
</main>

<footer>
  <span data-t="agree">Ao continuar concordas com os</span>
  <a href="#" data-t="terms">Termos de Uso</a> <span data-t="and">e</span>
  <a href="#" data-t="privacy_p">Política de Privacidade</a>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, sendPasswordResetEmail, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app  = initializeApp({ apiKey:"AIzaSyAW2ISQ2TKR2p0-QF_v0aADiD-ttDpGm3c", authDomain:"velora-ia-e2539.firebaseapp.com", projectId:"velora-ia-e2539", storageBucket:"velora-ia-e2539.firebasestorage.app", messagingSenderId:"876340453170", appId:"1:876340453170:web:bcca8ebde23563e26a412b", measurementId:"G-S8DDTPTQ20" });
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
let isReg = false;
let persistenciaPronta = setPersistence(auth, browserLocalPersistence).catch(() => {});

function aplicarPH() {
  document.querySelectorAll('[data-t-ph]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-t-ph'));
  });
}

onAuthStateChanged(auth, u => {
  window._authResolvidoIndex = true;
  if (u) { window.location.href = 'showcase.html'; return; }
  aplicarPH();
  document.getElementById('ls').classList.add('h');
});

window.alternarVerPassword = (id, btn) => {
  const campo = document.getElementById(id);
  const aVer = campo.type === 'password';
  campo.type = aVer ? 'text' : 'password';
  btn.style.color = aVer ? 'var(--accent)' : '';
};

window.loginGoogle = async () => {
  const btn = document.getElementById('btn-google');
  const htmlOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';
  hideMsg();
  try {
    await persistenciaPronta;
    await signInWithPopup(auth, provider);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = htmlOriginal;
    showErr(errMsg(e.code));
  }
};

window.submit = async () => {
  const em = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const cp = document.getElementById('confirm-password').value;
  hideMsg();
  if (!em) { showErr('Insere o e-mail'); return; }
  if (pw.length < 6) { showErr('Mínimo 6 caracteres'); return; }
  if (isReg && pw !== cp) { showErr('As palavras-passe não coincidem'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  function restaurarBotao() {
    btn.disabled = false;
    btn.innerHTML = `<span id="btn-txt">${t(isReg ? 'btn_register' : 'btn_access')}</span>`;
  }

  const tempoLimite = new Promise((_, reject) =>
    setTimeout(() => reject({ code: 'timeout' }), 10000)
  );

  try {
    await persistenciaPronta;

    if (isReg) {
      await Promise.race([createUserWithEmailAndPassword(auth, em, pw), tempoLimite]);
    } else {
      await Promise.race([signInWithEmailAndPassword(auth, em, pw), tempoLimite]);
    }
  } catch(e) {
    restaurarBotao();

    if (e.code === 'timeout') {
      showErr('A ligação está a demorar demasiado. Verifica a internet e tenta novamente, ou usa "Continuar com Google".');
      return;
    }
    if (e.code === 'auth/email-already-in-use') {
      const box = document.getElementById('error-box');
      box.innerHTML = '⚠️ Este e-mail já está registado. <a onclick="toLogin()">Clica aqui para entrar</a>.';
      box.style.display = 'block';
      return;
    }
    if (e.code === 'auth/user-not-found') {
      const box = document.getElementById('error-box');
      box.innerHTML = '⚠️ Não existe nenhuma conta com este e-mail. <a onclick="toRegister()">Clica aqui para criar conta</a>.';
      box.style.display = 'block';
      return;
    }

    showErr(errMsg(e.code));
  }
};

window.resetPass = async () => {
  const em = document.getElementById('email').value.trim();
  if (!em) { showErr('Insere o e-mail primeiro, depois clica aqui outra vez'); return; }
  hideMsg();
  try {
    await persistenciaPronta;
    await sendPasswordResetEmail(auth, em);
    showOk('E-mail de recuperação enviado! Verifica a tua caixa de entrada (e o spam).');
  } catch(e) {
    if (e.code === 'auth/user-not-found') {
      const box = document.getElementById('error-box');
      box.innerHTML = '⚠️ Não existe nenhuma conta com este e-mail. <a onclick="toRegister()">Clica aqui para criar conta</a>.';
      box.style.display = 'block';
      return;
    }
    showErr(errMsg(e.code));
  }
};

window.toRegister = () => {
  isReg = true;
  document.getElementById('confirm-wrap').style.display = 'block';
  document.getElementById('forgot-wrap').style.display = 'none';
  document.getElementById('btn-submit').innerHTML = `<span id="btn-txt">${t('btn_register')}</span>`;
  document.getElementById('switch-text').innerHTML = `<span>${t('have_account')}</span> <a onclick="toLogin()">${t('login_link')}</a>`;
  hideMsg();
};

window.toLogin = () => {
  isReg = false;
  document.getElementById('confirm-wrap').style.display = 'none';
  document.getElementById('forgot-wrap').style.display = 'block';
  document.getElementById('btn-submit').innerHTML = `<span id="btn-txt">${t('btn_access')}</span>`;
  document.getElementById('switch-text').innerHTML = `<span>${t('no_account')}</span> <a onclick="toRegister()">${t('create_account')}</a>`;
  hideMsg();
};

function showErr(m) { const e=document.getElementById('error-box'); e.textContent='⚠️ '+m; e.style.display='block'; }
function showOk(m) { const e=document.getElementById('success-box'); e.textContent='✅ '+m; e.style.display='block'; }
function hideMsg() { document.getElementById('error-box').style.display='none'; document.getElementById('success-box').style.display='none'; }

function errMsg(code) {
  const m = {
    'auth/invalid-email':'E-mail inválido.',
    'auth/user-not-found':'Não existe nenhuma conta com este e-mail.',
    'auth/wrong-password':'Palavra-passe incorrecta.',
    'auth/invalid-credential':'E-mail ou palavra-passe incorrectos.',
    'auth/email-already-in-use':'Este e-mail já está registado.',
    'auth/weak-password':'Palavra-passe muito fraca (mínimo 6 caracteres).',
    'auth/too-many-requests':'Muitas tentativas seguidas. Espera uns minutos e tenta de novo.',
    'auth/popup-closed-by-user':'Login com Google cancelado.',
    'auth/network-request-failed':'Sem ligação à internet. Verifica a tua rede.',
    'auth/user-disabled':'Esta conta foi desactivada. Contacta o suporte.',
  };
  return m[code] || 'Ocorreu um erro inesperado. Tenta novamente.';
}
</script>
</body>
